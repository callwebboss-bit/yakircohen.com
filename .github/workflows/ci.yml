name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Audit images
        run: npm run audit:images

      - name: Audit links
        run: npm run audit:links

      - name: Audit headings
        run: npm run audit:headings

      - name: Audit pricing
        run: npm run audit:pricing

      - name: Build (with Pagefind)
        run: npm run build:full
